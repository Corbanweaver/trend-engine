<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Engine — Viral Video Ideas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 6px;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .controls select,
        .controls input,
        .controls button {
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.9rem;
        }

        .controls select { min-width: 140px; }
        .controls input { flex: 1; min-width: 180px; }

        .btn-primary {
            background: #5b4cff !important;
            border: none !important;
            color: #fff !important;
            cursor: pointer;
            font-weight: 600;
            padding: 10px 20px !important;
            transition: background 0.2s;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .btn-primary:hover { background: #4a3de6 !important; }
        .btn-primary:disabled { background: #333 !important; cursor: not-allowed; }

        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 9px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .actions button:hover { background: #252525; border-color: #555; }

        .status {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
        }

        .status.info { display: block; background: #1a2332; border: 1px solid #2a4a6b; color: #6db3f2; }
        .status.success { display: block; background: #1a2e1a; border: 1px solid #2a6b2a; color: #6bf26d; }
        .status.error { display: block; background: #2e1a1a; border: 1px solid #6b2a2a; color: #f26d6d; }

        .section-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #222;
        }

        .trends {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 32px;
        }

        .trend-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            transition: border-color 0.2s;
        }

        .trend-card:hover { border-color: #5b4cff; }

        .trend-card .topic {
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            text-transform: capitalize;
            font-size: 0.9rem;
        }

        .trend-card .meta {
            font-size: 0.75rem;
            color: #666;
        }

        .trend-group {
            margin-bottom: 40px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
        }

        .trend-group h3 {
            font-size: 1.1rem;
            color: #5b4cff;
            margin-bottom: 16px;
            text-transform: capitalize;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trend-group h3 .badge {
            font-size: 0.7rem;
            background: #5b4cff22;
            color: #8b7fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .idea-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        .idea-card:hover { border-color: #444; }

        .idea-card .hook {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .idea-card .angle {
            color: #ffd93d;
            font-size: 0.85rem;
            margin-bottom: 6px;
            font-style: italic;
        }

        .idea-card .idea-text {
            color: #ccc;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .script-toggle {
            background: none;
            border: 1px solid #333;
            color: #888;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .script-toggle:hover { border-color: #5b4cff; color: #5b4cff; }

        .script-content {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #bbb;
            white-space: pre-wrap;
        }

        .script-content.open { display: block; }

        .videos-section {
            margin-top: 16px;
        }

        .videos-section h4 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .video-card {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .video-card:hover { border-color: #5b4cff; }

        .video-card .thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            cursor: pointer;
        }

        .video-card .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-card .thumb-wrap .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-card .thumb-wrap .play-overlay::after {
            content: "";
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #fff;
            margin-left: 3px;
        }

        .video-card .video-info {
            padding: 10px 12px;
        }

        .video-card .video-title {
            font-size: 0.82rem;
            color: #ddd;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-card .video-channel {
            font-size: 0.75rem;
            color: #666;
        }

        .video-embed-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .video-embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .loading {
            text-align: center;
            padding: 32px;
            color: #666;
        }

        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid #333;
            border-top-color: #5b4cff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty {
            text-align: center;
            padding: 32px;
            color: #555;
            font-size: 0.9rem;
        }

        label { font-size: 0.8rem; color: #888; margin-bottom: 4px; display: block; }

        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #222;
        }

        .tab-bar button {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tab-bar button:hover { color: #ccc; }
        .tab-bar button.active { color: #5b4cff; border-bottom-color: #5b4cff; }

        .yt-search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .yt-search-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Content Engine</h1>
            <p>Turn trending Reddit topics into viral video ideas with AI</p>
        </header>

        <div class="controls">
            <div>
                <label for="niche">Niche</label>
                <select id="niche">
                    <option value="fitness">Fitness</option>
                    <option value="dating">Dating</option>
                    <option value="finance">Finance</option>
                    <option value="productivity">Productivity</option>
                    <option value="nutrition">Nutrition</option>
                    <option value="mental health">Mental Health</option>
                    <option value="tech">Tech</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>
            <div style="flex:1; display:none;" id="custom-niche-wrap">
                <label for="custom-niche">Your niche</label>
                <input type="text" id="custom-niche" placeholder="e.g. crypto, cooking, parenting">
            </div>
            <div style="flex:1;">
                <label for="topic-input">Topic (optional)</label>
                <input type="text" id="topic-input" placeholder="e.g. cold plunge benefits, creatine myths">
            </div>
            <div style="display:flex; align-items:flex-end;">
                <button class="btn-primary" id="generate-btn" onclick="generateIdeas()">Generate Ideas</button>
            </div>
        </div>

        <div class="actions">
            <button onclick="ingestReddit()">Pull Reddit Posts</button>
            <button onclick="loadTrends()">View Trends</button>
            <button onclick="loadTrendIdeas()">Trends + Ideas + Videos</button>
            <button onclick="searchYouTube()">Search YouTube</button>
        </div>

        <div class="status" id="status"></div>

        <div id="trends-section" style="display:none;">
            <div class="section-title">Trending Topics</div>
            <div class="trends" id="trends-grid"></div>
        </div>

        <div id="youtube-section" style="display:none;">
            <div class="section-title">YouTube Examples</div>
            <div class="video-grid" id="youtube-grid"></div>
        </div>

        <div id="ideas-section" style="display:none;">
            <div class="section-title">Video Ideas & Scripts</div>
            <div id="ideas-list"></div>
        </div>
    </div>

    <script>
        const nicheSelect = document.getElementById('niche');
        const customWrap = document.getElementById('custom-niche-wrap');
        const customInput = document.getElementById('custom-niche');

        nicheSelect.addEventListener('change', () => {
            customWrap.style.display = nicheSelect.value === 'custom' ? 'block' : 'none';
        });

        function getNiche() {
            return nicheSelect.value === 'custom' ? customInput.value || 'fitness' : nicheSelect.value;
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        function hideStatus() {
            document.getElementById('status').className = 'status';
        }

        function showLoading(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Working on it...</div></div>';
        }

        function toggleScript(btn) {
            const content = btn.nextElementSibling;
            content.classList.toggle('open');
            btn.textContent = content.classList.contains('open') ? 'Hide Script' : 'View Script';
        }

        function playVideo(el, embedUrl) {
            el.innerHTML = `<div class="video-embed-container"><iframe src="${embedUrl}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
        }

        function renderIdeaCard(idea) {
            const scriptSection = idea.script ? `
                <button class="script-toggle" onclick="toggleScript(this)">View Script</button>
                <div class="script-content">${idea.script}</div>
            ` : '';

            return `
                <div class="idea-card">
                    <div class="hook">${escapeHtml(idea.hook)}</div>
                    ${idea.angle ? `<div class="angle">${escapeHtml(idea.angle)}</div>` : ''}
                    <div class="idea-text">${escapeHtml(idea.idea)}</div>
                    ${scriptSection}
                </div>
            `;
        }

        function renderVideoCard(video) {
            if (video.quota_exceeded) {
                return `
                    <div class="video-card" style="border-color: #ffd93d33;">
                        <div class="video-info" style="padding: 20px;">
                            <div class="video-title" style="color: #ffd93d; margin-bottom: 8px;">YouTube API quota exceeded</div>
                            <div class="video-channel" style="margin-bottom: 10px;">Quota resets daily at midnight Pacific time.</div>
                            <a href="${video.url}" target="_blank" style="color: #5b4cff; text-decoration: none; font-size: 0.85rem;">Search YouTube manually &rarr;</a>
                        </div>
                    </div>
                `;
            }

            const thumbHtml = video.thumbnail
                ? `<img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy">`
                : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#666;font-size:0.8rem;">No thumbnail</div>`;

            const clickAction = video.embed_url
                ? `onclick="playVideo(this, '${video.embed_url}')"`
                : `onclick="window.open('${video.url}', '_blank')"`;

            return `
                <div class="video-card">
                    <div class="thumb-wrap" ${clickAction}>
                        ${thumbHtml}
                        <div class="play-overlay"></div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title)}</div>
                        <div class="video-channel">${escapeHtml(video.channel)}</div>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function ingestReddit() {
            showStatus('Pulling posts from Reddit...', 'info');
            try {
                const res = await fetch('/ingest/reddit', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showStatus(`Done! Ingested ${data.ingested} new posts, skipped ${data.skipped} duplicates.`, 'success');
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function loadTrends() {
            document.getElementById('trends-section').style.display = 'block';
            showLoading('trends-grid');
            hideStatus();
            try {
                const res = await fetch('/trends/');
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                const grid = document.getElementById('trends-grid');
                if (data.trends.length === 0) {
                    grid.innerHTML = '<div class="empty">No trends yet. Pull Reddit posts first.</div>';
                    return;
                }
                grid.innerHTML = data.trends.map(t => `
                    <div class="trend-card">
                        <div class="topic">${escapeHtml(t.topic)}</div>
                        <div class="meta">${t.count} mentions</div>
                    </div>
                `).join('');
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function loadTrendIdeas() {
            document.getElementById('trends-section').style.display = 'block';
            document.getElementById('ideas-section').style.display = 'block';
            showLoading('trends-grid');
            showLoading('ideas-list');
            showStatus('Generating ideas from trends with YouTube examples... this may take a moment.', 'info');
            try {
                const niche = getNiche();
                const res = await fetch('/trend-ideas/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');

                const trendsGrid = document.getElementById('trends-grid');
                trendsGrid.innerHTML = data.trend_ideas.map(ti => `
                    <div class="trend-card">
                        <div class="topic">${escapeHtml(ti.trend)}</div>
                    </div>
                `).join('');

                const ideasList = document.getElementById('ideas-list');
                ideasList.innerHTML = data.trend_ideas.map(ti => {
                    const videosHtml = (ti.example_videos && ti.example_videos.length > 0) ? `
                        <div class="videos-section">
                            <h4>Example Videos from YouTube</h4>
                            <div class="video-grid">
                                ${ti.example_videos.map(renderVideoCard).join('')}
                            </div>
                        </div>
                    ` : '';

                    return `
                        <div class="trend-group">
                            <h3>${escapeHtml(ti.trend)} <span class="badge">${ti.ideas.length} ideas</span></h3>
                            ${ti.ideas.map(renderIdeaCard).join('')}
                            ${videosHtml}
                        </div>
                    `;
                }).join('');

                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function generateIdeas() {
            const topic = document.getElementById('topic-input').value.trim();
            if (!topic) {
                showStatus('Enter a topic to generate ideas.', 'error');
                return;
            }

            document.getElementById('ideas-section').style.display = 'block';
            showLoading('ideas-list');
            showStatus('Generating viral ideas with scripts...', 'info');
            document.getElementById('generate-btn').disabled = true;

            try {
                const niche = getNiche();

                const [ideasRes, ytRes] = await Promise.all([
                    fetch('/ideas/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: topic, niche })
                    }),
                    fetch('/youtube/search', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ query: `${niche} ${topic}`, max_results: 4 })
                    }).catch(() => null)
                ]);

                const ideasData = await ideasRes.json();
                if (!ideasRes.ok) throw new Error(ideasData.detail || 'Failed');

                let videosHtml = '';
                if (ytRes && ytRes.ok) {
                    const ytData = await ytRes.json();
                    if (ytData.videos && ytData.videos.length > 0) {
                        videosHtml = `
                            <div class="videos-section">
                                <h4>Example Videos from YouTube</h4>
                                <div class="video-grid">
                                    ${ytData.videos.map(renderVideoCard).join('')}
                                </div>
                            </div>
                        `;
                    }
                }

                const ideasList = document.getElementById('ideas-list');
                ideasList.innerHTML = `
                    <div class="trend-group">
                        <h3>${escapeHtml(topic)} <span class="badge">${ideasData.ideas.length} ideas</span></h3>
                        ${ideasData.ideas.map(renderIdeaCard).join('')}
                        ${videosHtml}
                    </div>
                `;

                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            } finally {
                document.getElementById('generate-btn').disabled = false;
            }
        }

        async function searchYouTube() {
            const topic = document.getElementById('topic-input').value.trim();
            const niche = getNiche();
            const query = topic || niche;

            document.getElementById('youtube-section').style.display = 'block';
            showLoading('youtube-grid');
            showStatus('Searching YouTube...', 'info');

            try {
                const res = await fetch('/youtube/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: `${query} short form video`, max_results: 6 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');

                const grid = document.getElementById('youtube-grid');
                if (data.videos.length === 0) {
                    grid.innerHTML = '<div class="empty">No videos found.</div>';
                } else {
                    grid.innerHTML = data.videos.map(renderVideoCard).join('');
                }
                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        document.getElementById('topic-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') generateIdeas();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Engine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
        }

        .top-bar {
            background: #fff;
            border-bottom: 1px solid #e5e5e7;
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1d1d1f;
            white-space: nowrap;
        }

        .logo span { color: #6c5ce7; }

        .search-bar {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
            min-width: 280px;
        }

        .search-bar select,
        .search-bar input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #d1d1d6;
            background: #f5f5f7;
            font-size: 0.85rem;
            color: #1d1d1f;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar select:focus,
        .search-bar input:focus { border-color: #6c5ce7; }

        .search-bar select { min-width: 120px; }
        .search-bar input { flex: 1; min-width: 140px; }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #6c5ce7;
            color: #fff;
        }

        .btn-primary:hover { background: #5a4bd1; }
        .btn-primary:disabled { background: #c8c8cc; cursor: not-allowed; }

        .btn-outline {
            background: #fff;
            color: #6c5ce7;
            border: 1px solid #6c5ce7;
        }

        .btn-outline:hover { background: #f0eeff; }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        .status-bar {
            padding: 10px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-bar.info { display: block; background: #eef0ff; color: #6c5ce7; border: 1px solid #d5d0ff; }
        .status-bar.error { display: block; background: #fff0f0; color: #e74c3c; border: 1px solid #ffd0d0; }
        .status-bar.success { display: block; background: #f0fff0; color: #27ae60; border: 1px solid #c0f0c0; }

        .source-pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .pill {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .pill:hover { transform: scale(1.05); }

        .pill-reddit { background: #fff0eb; color: #ff6b35; }
        .pill-youtube { background: #fff0f0; color: #e74c3c; }
        .pill-instagram { background: #fff0f6; color: #e1306c; }
        .pill-tiktok { background: #f0ffff; color: #00b8b8; }
        .pill-gtrends { background: #f0f5ff; color: #4285f4; }
        .pill-news { background: #f0fff0; color: #27ae60; }
        .pill-hn { background: #fff5eb; color: #f0652f; }
        .pill-web { background: #f5f0ff; color: #9b59b6; }

        .trend-card {
            background: #fff;
            border-radius: 14px;
            border: 1px solid #e5e5e7;
            margin-bottom: 20px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .trend-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.06); }

        .trend-header {
            padding: 18px 22px 14px;
            border-bottom: 1px solid #f0f0f2;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .trend-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1d1d1f;
        }

        .trend-badges {
            display: flex;
            gap: 6px;
        }

        .badge {
            font-size: 0.68rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge-ideas { background: #6c5ce7; color: #fff; }
        .badge-sources { background: #f0f0f2; color: #86868b; }

        .trend-body { padding: 0; }

        .idea-row {
            padding: 16px 22px;
            border-bottom: 1px solid #f5f5f7;
            display: flex;
            gap: 16px;
        }

        .idea-row:last-child { border-bottom: none; }

        .idea-number {
            width: 28px;
            height: 28px;
            background: #6c5ce7;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .idea-content { flex: 1; }

        .idea-hook {
            font-weight: 700;
            color: #e74c3c;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .idea-angle {
            color: #f39c12;
            font-size: 0.82rem;
            margin-bottom: 4px;
        }

        .idea-text {
            color: #636366;
            font-size: 0.82rem;
            margin-bottom: 8px;
        }

        .script-btn {
            font-size: 0.72rem;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #d1d1d6;
            background: #fff;
            color: #86868b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .script-btn:hover { border-color: #6c5ce7; color: #6c5ce7; }

        .script-box {
            display: none;
            margin-top: 10px;
            padding: 12px 16px;
            background: #f9f9fb;
            border-radius: 8px;
            font-size: 0.82rem;
            line-height: 1.7;
            color: #48484a;
            white-space: pre-wrap;
            border: 1px solid #e5e5e7;
        }

        .script-box.open { display: block; }

        .media-section {
            padding: 16px 22px;
            border-top: 1px solid #f0f0f2;
        }

        .media-section h4 {
            font-size: 0.82rem;
            color: #86868b;
            margin-bottom: 10px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .media-section h4 .arrow {
            transition: transform 0.2s;
            font-size: 0.7rem;
        }

        .media-section h4.open .arrow { transform: rotate(90deg); }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .media-body {
            display: none;
        }

        .media-body.open { display: block; }

        .m-card {
            background: #f9f9fb;
            border: 1px solid #e5e5e7;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .m-card:hover { border-color: #c8c8cc; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        .m-card .m-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #eee;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .m-card .m-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .m-card .m-body {
            padding: 8px 10px;
        }

        .m-card .m-title {
            font-size: 0.76rem;
            color: #1d1d1f;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-weight: 500;
        }

        .m-card .m-meta {
            font-size: 0.68rem;
            color: #86868b;
        }

        .link-item {
            padding: 8px 12px;
            background: #f9f9fb;
            border: 1px solid #e5e5e7;
            border-radius: 8px;
            margin-bottom: 6px;
            transition: border-color 0.2s;
        }

        .link-item:hover { border-color: #c8c8cc; }

        .link-item a {
            color: #6c5ce7;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .link-item a:hover { text-decoration: underline; }

        .link-item .l-meta {
            font-size: 0.7rem;
            color: #86868b;
            margin-top: 2px;
        }

        .link-item .l-snippet {
            font-size: 0.72rem;
            color: #636366;
            margin-top: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .gtrends-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .gtrends-pills span {
            padding: 4px 10px;
            background: #f0f5ff;
            border: 1px solid #d5e3ff;
            border-radius: 6px;
            font-size: 0.72rem;
            color: #4285f4;
        }

        .video-embed-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .video-embed-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            border-radius: 8px;
        }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn::after {
            content: "";
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 6px 0 6px 11px;
            border-color: transparent transparent transparent #fff;
            margin-left: 2px;
        }

        .loading-state {
            text-align: center;
            padding: 40px;
            color: #86868b;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e5e5e7;
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #86868b;
            font-size: 0.9rem;
        }

        .quick-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .quick-actions button {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #e5e5e7;
            background: #fff;
            color: #636366;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .quick-actions button:hover {
            background: #f0eeff;
            border-color: #6c5ce7;
            color: #6c5ce7;
        }

        #custom-niche-wrap { display: none; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <div class="logo">Content<span>Engine</span></div>
            <div class="search-bar">
                <select id="niche">
                    <option value="fitness">Fitness</option>
                    <option value="dating">Dating</option>
                    <option value="finance">Finance</option>
                    <option value="productivity">Productivity</option>
                    <option value="nutrition">Nutrition</option>
                    <option value="mental health">Mental Health</option>
                    <option value="tech">Tech</option>
                    <option value="cooking">Cooking</option>
                    <option value="gaming">Gaming</option>
                    <option value="fashion">Fashion</option>
                    <option value="music">Music</option>
                    <option value="travel">Travel</option>
                    <option value="beauty">Beauty</option>
                    <option value="entrepreneurship">Business</option>
                    <option value="photography">Photography</option>
                    <option value="parenting">Parenting</option>
                    <option value="pets">Pets</option>
                    <option value="education">Education</option>
                    <option value="sports">Sports</option>
                    <option value="diy">DIY</option>
                    <option value="motivation">Motivation</option>
                    <option value="custom">Custom...</option>
                </select>
                <input type="text" id="custom-niche" placeholder="Your niche..." style="display:none;">
                <input type="text" id="topic-input" placeholder="Topic (optional)...">
                <button class="btn btn-primary" id="generate-btn" onclick="runFullAnalysis()">Analyze</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="source-pills">
            <span class="pill pill-reddit">Reddit</span>
            <span class="pill pill-youtube">YouTube</span>
            <span class="pill pill-tiktok">TikTok</span>
            <span class="pill pill-gtrends">Google Trends</span>
            <span class="pill pill-news">Google News</span>
            <span class="pill pill-hn">Hacker News</span>
            <span class="pill pill-web">Web Search</span>
            <span class="pill pill-instagram">Instagram</span>
        </div>

        <div class="quick-actions">
            <button onclick="ingestReddit()">Pull Reddit Posts</button>
            <button onclick="searchSingle('youtube')">YouTube Only</button>
            <button onclick="searchSingle('tiktok')">TikTok Only</button>
            <button onclick="searchSingle('news')">News Only</button>
            <button onclick="searchSingle('hn')">Hacker News Only</button>
            <button onclick="searchSingle('web')">Web Only</button>
            <button onclick="searchSingle('gtrends')">Trends Only</button>
        </div>

        <div class="status-bar" id="status"></div>

        <div id="results"></div>
    </div>

    <script>
        const nicheSelect = document.getElementById('niche');
        const customInput = document.getElementById('custom-niche');

        nicheSelect.addEventListener('change', () => {
            customInput.style.display = nicheSelect.value === 'custom' ? 'block' : 'none';
        });

        function getNiche() {
            return nicheSelect.value === 'custom' ? customInput.value || 'fitness' : nicheSelect.value;
        }

        function getQuery() {
            return document.getElementById('topic-input').value.trim() || getNiche();
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status-bar ' + type;
        }

        function hideStatus() {
            document.getElementById('status').className = 'status-bar';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        function safeUrl(url) {
            if (!url) return '#';
            try {
                const u = new URL(url);
                if (u.protocol === 'https:' || u.protocol === 'http:') return url;
            } catch {}
            return '#';
        }

        function fmt(n) {
            n = n || 0;
            if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return String(n);
        }

        function toggleScript(btn) {
            const box = btn.nextElementSibling;
            box.classList.toggle('open');
            btn.textContent = box.classList.contains('open') ? 'Hide Script' : 'View Script';
        }

        function toggleMedia(h4) {
            h4.classList.toggle('open');
            h4.nextElementSibling.classList.toggle('open');
        }

        function renderIdea(idea, idx) {
            return `
                <div class="idea-row">
                    <div class="idea-number">${idx + 1}</div>
                    <div class="idea-content">
                        <div class="idea-hook">${escapeHtml(idea.hook)}</div>
                        <div class="idea-angle">${escapeHtml(idea.angle)}</div>
                        <div class="idea-text">${escapeHtml(idea.idea)}</div>
                        ${idea.script ? `
                            <button class="script-btn" onclick="toggleScript(this)">View Script</button>
                            <div class="script-box">${escapeHtml(idea.script)}</div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderYTCard(v) {
            const vid = v.video_id || v.videoId || '';
            return `
                <div class="m-card" onclick="this.querySelector('.m-thumb').innerHTML='<div class=\\'video-embed-container\\'><iframe src=\\'https://www.youtube.com/embed/${vid}?autoplay=1\\' allow=\\'autoplay\\' allowfullscreen></iframe></div>'">
                    <div class="m-thumb">
                        ${v.thumbnail ? `<img src="${v.thumbnail}" loading="lazy">` : ''}
                        <div class="play-btn"></div>
                    </div>
                    <div class="m-body">
                        <div class="m-title">${escapeHtml(v.title)}</div>
                        <div class="m-meta">${escapeHtml(v.channel || v.channelTitle || '')}</div>
                    </div>
                </div>`;
        }

        function renderTTCard(v) {
            return `
                <div class="m-card">
                    <a href="${safeUrl(v.url)}" target="_blank" rel="noopener">
                        <div class="m-thumb" style="aspect-ratio:9/16;max-height:140px;">
                            ${v.cover ? `<img src="${v.cover}" loading="lazy">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#00b8b8;font-size:0.8rem;">View on TikTok</div>'}
                        </div>
                    </a>
                    <div class="m-body">
                        <div class="m-title">${escapeHtml(v.description)}</div>
                        <div class="m-meta">@${escapeHtml(v.author)} &middot; ${fmt(v.play_count)} plays</div>
                    </div>
                </div>`;
        }

        function renderIGCard(p) {
            const thumb = p.thumbnail_url || p.media_url || '';
            return `
                <div class="m-card">
                    <a href="${safeUrl(p.permalink)}" target="_blank" rel="noopener">
                        <div class="m-thumb" style="aspect-ratio:1;">${thumb ? `<img src="${thumb}" loading="lazy">` : ''}</div>
                    </a>
                    <div class="m-body">
                        <div class="m-title">${escapeHtml(p.caption || 'No caption')}</div>
                        <div class="m-meta">${fmt(p.like_count)} likes</div>
                    </div>
                </div>`;
        }

        function renderNewsItem(a) {
            return `<div class="link-item"><a href="${safeUrl(a.link)}" target="_blank">${escapeHtml(a.title)}</a><div class="l-meta">${escapeHtml(a.source)} &middot; ${escapeHtml(a.published)}</div></div>`;
        }

        function renderHNItem(s) {
            return `<div class="link-item"><a href="${safeUrl(s.hn_link || s.url)}" target="_blank">${escapeHtml(s.title)}</a><div class="l-meta">${s.score} pts &middot; ${s.comments} comments</div></div>`;
        }

        function renderWebItem(r) {
            return `<div class="link-item"><a href="${safeUrl(r.url)}" target="_blank">${escapeHtml(r.title)}</a><div class="l-snippet">${escapeHtml(r.snippet)}</div></div>`;
        }

        function renderRedditItem(p) {
            return `<div class="link-item"><a href="${safeUrl(p.url)}" target="_blank">${escapeHtml(p.title)}</a><div class="l-meta">r/${escapeHtml(p.subreddit)} &middot; ${fmt(p.score)} upvotes &middot; ${p.num_comments} comments</div></div>`;
        }

        function renderMediaSection(label, pillClass, items, renderFn, isGrid) {
            if (!items || !items.length) return '';
            return `
                <div class="media-section">
                    <h4 onclick="toggleMedia(this)"><span class="arrow">▸</span> <span class="pill ${pillClass}" style="cursor:pointer;">${label}</span> ${items.length} results</h4>
                    <div class="media-body">
                        ${isGrid ? `<div class="media-grid">${items.map(renderFn).join('')}</div>` : items.map(renderFn).join('')}
                    </div>
                </div>`;
        }

        function renderTrendCard(ti) {
            let srcCount = 0;
            const check = [ti.example_videos, ti.instagram_posts, ti.tiktok_videos, ti.google_news, ti.hackernews_stories, ti.web_results, ti.reddit_posts];
            check.forEach(a => { if (a && a.length) srcCount++; });
            const gd = ti.google_trends_data || {};
            if ((gd.related_queries || []).length || (gd.trending_searches || []).length) srcCount++;

            let trendsHtml = '';
            const rq = gd.related_queries || [];
            const ts = gd.trending_searches || [];
            if (rq.length || ts.length) {
                trendsHtml = `
                    <div class="media-section">
                        <h4 onclick="toggleMedia(this)"><span class="arrow">▸</span> <span class="pill pill-gtrends">Google Trends</span> Related searches</h4>
                        <div class="media-body">
                            <div class="gtrends-pills">
                                ${rq.map(q => `<span>${escapeHtml(q.query)}</span>`).join('')}
                                ${ts.map(t => `<span style="background:#f0fff0;color:#27ae60;border-color:#c0f0c0;">${escapeHtml(t)}</span>`).join('')}
                            </div>
                        </div>
                    </div>`;
            }

            return `
                <div class="trend-card">
                    <div class="trend-header">
                        <div class="trend-title">${escapeHtml(ti.trend)}</div>
                        <div class="trend-badges">
                            <span class="badge badge-ideas">${ti.ideas.length} ideas</span>
                            <span class="badge badge-sources">${srcCount} sources</span>
                        </div>
                    </div>
                    <div class="trend-body">
                        ${ti.ideas.map((idea, i) => renderIdea(idea, i)).join('')}
                        ${renderMediaSection('YouTube', 'pill-youtube', ti.example_videos, renderYTCard, true)}
                        ${renderMediaSection('TikTok', 'pill-tiktok', ti.tiktok_videos, renderTTCard, true)}
                        ${renderMediaSection('Instagram', 'pill-instagram', ti.instagram_posts, renderIGCard, true)}
                        ${trendsHtml}
                        ${renderMediaSection('News', 'pill-news', ti.google_news, renderNewsItem, false)}
                        ${renderMediaSection('Reddit', 'pill-reddit', ti.reddit_posts, renderRedditItem, false)}
                        ${renderMediaSection('Hacker News', 'pill-hn', ti.hackernews_stories, renderHNItem, false)}
                        ${renderMediaSection('Web', 'pill-web', ti.web_results, renderWebItem, false)}
                    </div>
                </div>`;
        }

        async function ingestReddit() {
            showStatus('Pulling posts from Reddit...', 'info');
            try {
                const res = await fetch('/ingest/reddit', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showStatus(`Ingested ${data.ingested || 0} new posts (${data.skipped || 0} already stored)`, 'success');
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        async function runFullAnalysis() {
            const niche = getNiche();
            const el = document.getElementById('results');
            el.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Scanning 8 sources and generating AI ideas...</div><div style="font-size:0.75rem;color:#aeaeb2;margin-top:4px;">This takes 15-30 seconds</div></div>';
            showStatus('Analyzing trends across all sources...', 'info');

            try {
                const res = await fetch('/trend-ideas/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');

                if (!data.trend_ideas || !data.trend_ideas.length) {
                    el.innerHTML = '<div class="empty-state">No trends found. Try clicking "Pull Reddit Posts" first to get data.</div>';
                    hideStatus();
                    return;
                }

                el.innerHTML = data.trend_ideas.map(renderTrendCard).join('');
                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
                el.innerHTML = '';
            }
        }

        async function searchSingle(source) {
            const query = getQuery();
            const el = document.getElementById('results');
            el.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Searching...</div></div>';
            showStatus(`Searching ${source}...`, 'info');

            const endpoints = {
                youtube: { url: '/youtube/search', body: { query, max_results: 6 }, render: (d) => d.videos?.length ? `<div class="media-grid">${d.videos.map(renderYTCard).join('')}</div>` : '<div class="empty-state">No results.</div>' },
                tiktok: { url: '/tiktok/search', body: { query, max_results: 6 }, render: (d) => d.videos?.length ? `<div class="media-grid">${d.videos.map(renderTTCard).join('')}</div>` : '<div class="empty-state">No results.</div>' },
                instagram: { url: '/instagram/search', body: { query, max_results: 6 }, render: (d) => d.posts?.length ? `<div class="media-grid">${d.posts.map(renderIGCard).join('')}</div>` : '<div class="empty-state">No Instagram results. Business account setup needed.</div>' },
                news: { url: '/google-news/search', body: { query, max_results: 10 }, render: (d) => d.articles?.length ? d.articles.map(renderNewsItem).join('') : '<div class="empty-state">No news found.</div>' },
                hn: { url: '/hackernews/search', body: { query, max_results: 10 }, render: (d) => d.stories?.length ? d.stories.map(renderHNItem).join('') : '<div class="empty-state">No stories found.</div>' },
                web: { url: '/web-search/trending', body: { query, max_results: 10 }, render: (d) => d.results?.length ? d.results.map(renderWebItem).join('') : '<div class="empty-state">No web results.</div>' },
                gtrends: {
                    url: '/google-trends/search',
                    body: { query },
                    render: (d) => {
                        let html = '';
                        if (d.related_queries?.length) {
                            html += '<h4 style="color:#4285f4;font-size:0.85rem;margin-bottom:8px;font-weight:600;">Related Searches</h4>';
                            html += '<div class="gtrends-pills">' + d.related_queries.map(q => `<span>${escapeHtml(q.query)}</span>`).join('') + '</div>';
                        }
                        if (d.trending_searches?.length) {
                            html += '<h4 style="color:#27ae60;font-size:0.85rem;margin:14px 0 8px;font-weight:600;">Currently Trending</h4>';
                            html += '<div class="gtrends-pills">' + d.trending_searches.map(t => `<span style="background:#f0fff0;color:#27ae60;border-color:#c0f0c0;">${escapeHtml(t)}</span>`).join('') + '</div>';
                        }
                        return html || '<div class="empty-state">No trends data found.</div>';
                    }
                },
            };

            const cfg = endpoints[source];
            if (!cfg) return;

            try {
                const res = await fetch(cfg.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cfg.body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                el.innerHTML = `<div class="trend-card"><div class="trend-header"><div class="trend-title">${escapeHtml(source.charAt(0).toUpperCase() + source.slice(1))} Results: ${escapeHtml(query)}</div></div><div style="padding:16px 22px;">${cfg.render(data)}</div></div>`;
                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
                el.innerHTML = '';
            }
        }

        document.getElementById('topic-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') runFullAnalysis();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Engine — AI-Powered Viral Video Ideas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 28px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        header p {
            color: #666;
            font-size: 0.85rem;
        }

        .source-badges {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .source-badges span {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .controls label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 4px;
        }

        .controls select,
        .controls input,
        .controls button {
            padding: 9px 12px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            background: #141414;
            color: #e0e0e0;
            font-size: 0.85rem;
        }

        .controls select { min-width: 130px; }
        .controls input { flex: 1; min-width: 160px; }

        .btn-primary {
            background: #5b4cff !important;
            border: none !important;
            color: #fff !important;
            cursor: pointer;
            font-weight: 600;
            padding: 9px 18px !important;
            transition: background 0.2s;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .btn-primary:hover { background: #4a3de6 !important; }
        .btn-primary:disabled { background: #333 !important; cursor: not-allowed; }

        .actions {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .actions button {
            padding: 7px 12px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            background: #141414;
            color: #ccc;
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
        }

        .actions button:hover { background: #1e1e1e; border-color: #444; }

        .status {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
        }

        .status.info { display: block; background: #1a1a2e; color: #7b8cff; border: 1px solid #2a2a4e; }
        .status.error { display: block; background: #2e1a1a; color: #ff6b6b; border: 1px solid #4e2a2a; }
        .status.success { display: block; background: #1a2e1a; color: #6bff6b; border: 1px solid #2a4e2a; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: #5b4cff;
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .trend-group {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .trend-group h3 {
            font-size: 1rem;
            margin-bottom: 14px;
            color: #fff;
        }

        .idea-card {
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 10px;
        }

        .idea-card .hook {
            color: #ff4444;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .idea-card .angle {
            color: #ffd700;
            font-size: 0.82rem;
            margin-bottom: 6px;
        }

        .idea-card .idea-text {
            color: #bbb;
            font-size: 0.82rem;
            margin-bottom: 8px;
        }

        .script-toggle {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #888;
            cursor: pointer;
        }

        .script-toggle:hover { border-color: #555; }

        .script-content {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: #0a0a0a;
            border-radius: 8px;
            border: 1px solid #1e1e1e;
            font-size: 0.82rem;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-wrap;
        }

        .script-content.open { display: block; }

        .source-section {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid #1e1e1e;
        }

        .source-section h4 {
            font-size: 0.85rem;
            margin-bottom: 10px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .source-label {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 600;
        }

        .source-youtube { background: #ff000020; color: #ff4444; }
        .source-instagram { background: #e1306c20; color: #e1306c; }
        .source-tiktok { background: #00f2ea20; color: #00f2ea; }
        .source-news { background: #4caf5020; color: #66bb6a; }
        .source-gtrends { background: #4285f420; color: #4285f4; }
        .source-hn { background: #ff660020; color: #ff6600; }
        .source-web { background: #9c27b020; color: #ba68c8; }
        .source-reddit { background: #ff450020; color: #ff6b35; }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .mini-card {
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .mini-card:hover { border-color: #444; }

        .mini-card .thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }

        .mini-card .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mini-card .card-body {
            padding: 8px 10px;
        }

        .mini-card .card-title {
            font-size: 0.78rem;
            color: #ddd;
            margin-bottom: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .mini-card .card-meta {
            font-size: 0.7rem;
            color: #666;
        }

        .list-item {
            padding: 8px 12px;
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 8px;
            margin-bottom: 6px;
            transition: border-color 0.2s;
        }

        .list-item:hover { border-color: #444; }

        .list-item a {
            color: #7b8cff;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
        }

        .list-item a:hover { color: #9ba8ff; }

        .list-item .item-meta {
            font-size: 0.72rem;
            color: #666;
            margin-top: 2px;
        }

        .list-item .item-snippet {
            font-size: 0.75rem;
            color: #888;
            margin-top: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .trends {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .trend-pill {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .trend-pill .topic {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .trend-pill .score { font-size: 0.75rem; color: #5b4cff; }

        .video-embed-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .video-embed-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        .loading {
            text-align: center;
            padding: 32px;
            color: #666;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #333;
            border-top-color: #5b4cff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto 10px;
        }

        .empty {
            text-align: center;
            padding: 20px;
            color: #555;
            font-size: 0.85rem;
        }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
        }

        .collapsible-header::before {
            content: "▸";
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.2s;
        }

        .collapsible-header.open::before {
            transform: rotate(90deg);
        }

        .collapsible-body {
            display: none;
        }

        .collapsible-body.open {
            display: block;
        }

        .data-source-count {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            padding: 10px 14px;
            background: #111;
            border-radius: 10px;
            border: 1px solid #1e1e1e;
        }

        .data-source-count .ds-item {
            font-size: 0.75rem;
            color: #888;
        }

        .data-source-count .ds-item span {
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Content Engine</h1>
            <p>AI-powered viral video ideas from 8+ data sources</p>
            <div class="source-badges">
                <span class="source-label source-reddit">Reddit</span>
                <span class="source-label source-youtube">YouTube</span>
                <span class="source-label source-instagram">Instagram</span>
                <span class="source-label source-tiktok">TikTok</span>
                <span class="source-label source-gtrends">Google Trends</span>
                <span class="source-label source-news">Google News</span>
                <span class="source-label source-hn">Hacker News</span>
                <span class="source-label source-web">Web Search</span>
            </div>
        </header>

        <div class="controls">
            <div>
                <label for="niche">Niche</label>
                <select id="niche">
                    <option value="fitness">Fitness</option>
                    <option value="dating">Dating</option>
                    <option value="finance">Finance</option>
                    <option value="productivity">Productivity</option>
                    <option value="nutrition">Nutrition</option>
                    <option value="mental health">Mental Health</option>
                    <option value="tech">Tech</option>
                    <option value="cooking">Cooking</option>
                    <option value="gaming">Gaming</option>
                    <option value="fashion">Fashion</option>
                    <option value="music">Music</option>
                    <option value="travel">Travel</option>
                    <option value="beauty">Beauty</option>
                    <option value="entrepreneurship">Entrepreneurship</option>
                    <option value="photography">Photography</option>
                    <option value="parenting">Parenting</option>
                    <option value="pets">Pets</option>
                    <option value="education">Education</option>
                    <option value="sports">Sports</option>
                    <option value="diy">DIY</option>
                    <option value="motivation">Motivation</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>
            <div style="flex:1; display:none;" id="custom-niche-wrap">
                <label for="custom-niche">Your niche</label>
                <input type="text" id="custom-niche" placeholder="e.g. crypto, gardening, cars">
            </div>
            <div style="flex:1;">
                <label for="topic-input">Topic (optional)</label>
                <input type="text" id="topic-input" placeholder="e.g. cold plunge benefits, creatine myths">
            </div>
            <div style="display:flex; align-items:flex-end;">
                <button class="btn-primary" id="generate-btn" onclick="generateIdeas()">Generate Ideas</button>
            </div>
        </div>

        <div class="actions">
            <button onclick="ingestReddit()">Pull Reddit Posts</button>
            <button onclick="loadTrends()">View Trends</button>
            <button onclick="loadTrendIdeas()">Full Analysis (All Sources)</button>
            <button onclick="searchYouTube()">YouTube</button>
            <button onclick="searchTikTok()">TikTok</button>
            <button onclick="searchInstagram()">Instagram</button>
            <button onclick="searchGoogleNews()">News</button>
            <button onclick="searchHN()">Hacker News</button>
            <button onclick="searchWeb()">Web Search</button>
            <button onclick="searchGoogleTrends()">Google Trends</button>
        </div>

        <div class="status" id="status"></div>

        <div id="trends-section" style="display:none;">
            <div class="section-title">Trending Topics</div>
            <div class="trends" id="trends-grid"></div>
        </div>

        <div id="results-section" style="display:none;">
            <div class="section-title" id="results-title">Results</div>
            <div id="results-grid"></div>
        </div>

        <div id="ideas-section" style="display:none;">
            <div class="section-title">Video Ideas & Scripts</div>
            <div id="ideas-list"></div>
        </div>
    </div>

    <script>
        const nicheSelect = document.getElementById('niche');
        const customWrap = document.getElementById('custom-niche-wrap');
        const customInput = document.getElementById('custom-niche');

        nicheSelect.addEventListener('change', () => {
            customWrap.style.display = nicheSelect.value === 'custom' ? 'block' : 'none';
        });

        function getNiche() {
            return nicheSelect.value === 'custom' ? customInput.value || 'fitness' : nicheSelect.value;
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        function hideStatus() {
            document.getElementById('status').className = 'status';
        }

        function showLoading(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '<div class="loading"><div class="spinner"></div><div>Scanning sources...</div></div>';
        }

        function toggleScript(btn) {
            const content = btn.nextElementSibling;
            content.classList.toggle('open');
            btn.textContent = content.classList.contains('open') ? 'Hide Script' : 'View Script';
        }

        function toggleCollapsible(header) {
            header.classList.toggle('open');
            header.nextElementSibling.classList.toggle('open');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function safeUrl(url) {
            if (!url) return '#';
            try {
                const u = new URL(url);
                if (u.protocol === 'https:' || u.protocol === 'http:') return url;
            } catch {}
            return '#';
        }

        function formatCount(n) {
            if (n >= 1000000000) return (n / 1000000000).toFixed(1) + 'B';
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return String(n || 0);
        }

        function renderIdeaCard(idea) {
            return `
                <div class="idea-card">
                    <div class="hook">${escapeHtml(idea.hook)}</div>
                    <div class="angle">${escapeHtml(idea.angle)}</div>
                    <div class="idea-text">${escapeHtml(idea.idea)}</div>
                    ${idea.script ? `
                        <button class="script-toggle" onclick="toggleScript(this)">View Script</button>
                        <div class="script-content">${escapeHtml(idea.script)}</div>
                    ` : ''}
                </div>
            `;
        }

        function renderVideoCard(video) {
            const thumbUrl = video.thumbnail || '';
            const vidId = video.video_id || video.videoId || '';
            const channel = video.channel || video.channelTitle || '';

            return `
                <div class="mini-card" onclick="this.querySelector('.thumb').innerHTML='<div class=\\'video-embed-container\\'><iframe src=\\'https://www.youtube.com/embed/${vidId}?autoplay=1\\' allow=\\'autoplay\\' allowfullscreen></iframe></div>'">
                    <div class="thumb" style="position:relative;">
                        ${thumbUrl ? `<img src="${thumbUrl}" loading="lazy">` : ''}
                        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:rgba(0,0,0,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;"><div style="width:0;height:0;border-style:solid;border-width:8px 0 8px 14px;border-color:transparent transparent transparent #fff;margin-left:2px;"></div></div>
                    </div>
                    <div class="card-body">
                        <div class="card-title">${escapeHtml(video.title || '')}</div>
                        <div class="card-meta">${escapeHtml(channel)}</div>
                    </div>
                </div>
            `;
        }

        function renderIgCard(post) {
            const thumb = post.thumbnail_url || post.media_url || '';
            return `
                <div class="mini-card">
                    <a href="${safeUrl(post.permalink)}" target="_blank" rel="noopener">
                        <div class="thumb" style="aspect-ratio:1;">${thumb ? `<img src="${thumb}" loading="lazy">` : ''}</div>
                    </a>
                    <div class="card-body">
                        <div class="card-title">${escapeHtml(post.caption || 'No caption')}</div>
                        <div class="card-meta">${formatCount(post.like_count)} likes &middot; ${post.media_type}</div>
                    </div>
                </div>
            `;
        }

        function renderTtCard(video) {
            return `
                <div class="mini-card">
                    <a href="${safeUrl(video.url)}" target="_blank" rel="noopener">
                        <div class="thumb" style="aspect-ratio:9/16;max-height:160px;">${video.cover ? `<img src="${video.cover}" loading="lazy">` : '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#00f2ea;font-size:1.5rem;">TikTok</div>'}</div>
                    </a>
                    <div class="card-body">
                        <div class="card-title">${escapeHtml(video.description || '')}</div>
                        <div class="card-meta">@${escapeHtml(video.author)} &middot; ${formatCount(video.play_count)} plays</div>
                    </div>
                </div>
            `;
        }

        function renderNewsItem(article) {
            return `
                <div class="list-item">
                    <a href="${safeUrl(article.link)}" target="_blank" rel="noopener">${escapeHtml(article.title)}</a>
                    <div class="item-meta">${escapeHtml(article.source || '')} &middot; ${escapeHtml(article.published || '')}</div>
                </div>
            `;
        }

        function renderHNItem(story) {
            return `
                <div class="list-item">
                    <a href="${safeUrl(story.hn_link || story.url)}" target="_blank" rel="noopener">${escapeHtml(story.title)}</a>
                    <div class="item-meta">${story.score} pts &middot; ${story.comments} comments &middot; by ${escapeHtml(story.author)}</div>
                </div>
            `;
        }

        function renderWebItem(result) {
            return `
                <div class="list-item">
                    <a href="${safeUrl(result.url)}" target="_blank" rel="noopener">${escapeHtml(result.title)}</a>
                    <div class="item-snippet">${escapeHtml(result.snippet || '')}</div>
                </div>
            `;
        }

        function renderRedditItem(post) {
            return `
                <div class="list-item">
                    <a href="${safeUrl(post.url)}" target="_blank" rel="noopener">${escapeHtml(post.title)}</a>
                    <div class="item-meta">r/${escapeHtml(post.subreddit)} &middot; ${formatCount(post.score)} upvotes &middot; ${post.num_comments} comments</div>
                </div>
            `;
        }

        function renderSourceSection(label, cssClass, items, renderFn, useGrid) {
            if (!items || items.length === 0) return '';
            const content = useGrid
                ? `<div class="card-grid">${items.map(renderFn).join('')}</div>`
                : items.map(renderFn).join('');
            return `
                <div class="source-section">
                    <h4 class="collapsible-header" onclick="toggleCollapsible(this)">
                        <span class="source-label ${cssClass}">${label}</span> ${items.length} results
                    </h4>
                    <div class="collapsible-body">${content}</div>
                </div>
            `;
        }

        function renderTrendGroup(ti) {
            const ytHtml = renderSourceSection('YouTube', 'source-youtube', ti.example_videos, renderVideoCard, true);
            const igHtml = renderSourceSection('Instagram', 'source-instagram', ti.instagram_posts, renderIgCard, true);
            const ttHtml = renderSourceSection('TikTok', 'source-tiktok', ti.tiktok_videos, renderTtCard, true);
            const newsHtml = renderSourceSection('News', 'source-news', ti.google_news, renderNewsItem, false);
            const hnHtml = renderSourceSection('Hacker News', 'source-hn', ti.hackernews_stories, renderHNItem, false);
            const webHtml = renderSourceSection('Web', 'source-web', ti.web_results, renderWebItem, false);
            const redditHtml = renderSourceSection('Reddit', 'source-reddit', ti.reddit_posts, renderRedditItem, false);

            let trendsHtml = '';
            const gd = ti.google_trends_data || {};
            const relatedQ = gd.related_queries || [];
            const trendingS = gd.trending_searches || [];
            if (relatedQ.length > 0 || trendingS.length > 0) {
                const pills = relatedQ.map(q => `<span style="display:inline-block;padding:3px 8px;background:#0d0d0d;border:1px solid #222;border-radius:6px;font-size:0.72rem;color:#4285f4;margin:2px;">${escapeHtml(q.query)}</span>`).join('');
                const trendPills = trendingS.map(t => `<span style="display:inline-block;padding:3px 8px;background:#0d0d0d;border:1px solid #222;border-radius:6px;font-size:0.72rem;color:#66bb6a;margin:2px;">${escapeHtml(t)}</span>`).join('');
                trendsHtml = `
                    <div class="source-section">
                        <h4 class="collapsible-header" onclick="toggleCollapsible(this)">
                            <span class="source-label source-gtrends">Google Trends</span> Related searches
                        </h4>
                        <div class="collapsible-body">
                            ${pills ? `<div style="margin-bottom:8px;">${pills}</div>` : ''}
                            ${trendPills ? `<div style="margin-top:6px;"><span style="font-size:0.72rem;color:#666;">Also trending:</span> ${trendPills}</div>` : ''}
                        </div>
                    </div>
                `;
            }

            let sourceCount = 0;
            if (ti.example_videos?.length) sourceCount++;
            if (ti.instagram_posts?.length) sourceCount++;
            if (ti.tiktok_videos?.length) sourceCount++;
            if (ti.google_news?.length) sourceCount++;
            if (ti.hackernews_stories?.length) sourceCount++;
            if (ti.web_results?.length) sourceCount++;
            if (ti.reddit_posts?.length) sourceCount++;
            if (relatedQ.length || trendingS.length) sourceCount++;

            return `
                <div class="trend-group">
                    <h3>${escapeHtml(ti.trend)} <span class="badge">${ti.ideas.length} ideas</span> <span class="badge" style="background:#333;">${sourceCount} sources</span></h3>
                    ${ti.ideas.map(renderIdeaCard).join('')}
                    ${ytHtml}${igHtml}${ttHtml}${trendsHtml}${newsHtml}${hnHtml}${webHtml}${redditHtml}
                </div>
            `;
        }

        async function ingestReddit() {
            showStatus('Pulling posts from Reddit...', 'info');
            try {
                const res = await fetch('/ingest/reddit', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showStatus(`Ingested ${data.ingested || data.new_posts || 0} new posts (${data.skipped || 0} skipped)`, 'success');
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function loadTrends() {
            document.getElementById('trends-section').style.display = 'block';
            showLoading('trends-grid');
            showStatus('Analyzing trends...', 'info');
            try {
                const res = await fetch('/trends/');
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                document.getElementById('trends-grid').innerHTML = data.trends.map(t => `
                    <div class="trend-pill">
                        <div class="topic">${escapeHtml(t.topic)}</div>
                        <div class="score">Score: ${t.score}</div>
                    </div>
                `).join('');
                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function loadTrendIdeas() {
            document.getElementById('trends-section').style.display = 'block';
            document.getElementById('ideas-section').style.display = 'block';
            showLoading('trends-grid');
            showLoading('ideas-list');
            showStatus('Scanning 8+ sources and generating AI ideas... this may take 30-60 seconds.', 'info');

            try {
                const niche = getNiche();
                const res = await fetch('/trend-ideas/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');

                document.getElementById('trends-grid').innerHTML = data.trend_ideas.map(ti => `
                    <div class="trend-pill">
                        <div class="topic">${escapeHtml(ti.trend)}</div>
                    </div>
                `).join('');

                document.getElementById('ideas-list').innerHTML = data.trend_ideas.map(renderTrendGroup).join('');
                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        async function generateIdeas() {
            const topic = document.getElementById('topic-input').value.trim();
            const niche = getNiche();
            if (!topic) {
                showStatus('Enter a topic to generate ideas for.', 'error');
                return;
            }

            document.getElementById('ideas-section').style.display = 'block';
            showLoading('ideas-list');
            showStatus('Generating viral ideas...', 'info');

            try {
                const res = await fetch('/ideas/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: topic, niche })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                document.getElementById('ideas-list').innerHTML = data.ideas.map(renderIdeaCard).join('');
                hideStatus();
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
        }

        function showResults(title, html) {
            document.getElementById('results-section').style.display = 'block';
            document.getElementById('results-title').textContent = title;
            document.getElementById('results-grid').innerHTML = html;
        }

        async function searchYouTube() {
            const query = document.getElementById('topic-input').value.trim() || getNiche();
            showStatus('Searching YouTube...', 'info');
            try {
                const res = await fetch('/youtube/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, max_results: 6 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showResults('YouTube Results', data.videos.length
                    ? `<div class="card-grid">${data.videos.map(renderVideoCard).join('')}</div>`
                    : '<div class="empty">No YouTube videos found.</div>');
                hideStatus();
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        async function searchTikTok() {
            const query = document.getElementById('topic-input').value.trim() || getNiche();
            showStatus('Searching TikTok...', 'info');
            try {
                const res = await fetch('/tiktok/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, max_results: 6 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showResults('TikTok Results', data.videos.length
                    ? `<div class="card-grid">${data.videos.map(renderTtCard).join('')}</div>`
                    : '<div class="empty">No TikTok results found.</div>');
                hideStatus();
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        async function searchInstagram() {
            const query = document.getElementById('topic-input').value.trim() || getNiche();

            try {
                const res = await fetch('/instagram/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, max_results: 6 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showResults('Instagram Results', data.posts.length
                    ? `<div class="card-grid">${data.posts.map(renderIgCard).join('')}</div>`
                    : '<div class="empty">No Instagram posts found. Business account setup may be needed.</div>');
                hideStatus();
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        async function searchGoogleNews() {
            const query = document.getElementById('topic-input').value.trim() || getNiche();
            showStatus('Searching Google News...', 'info');
            try {
                const res = await fetch('/google-news/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, max_results: 10 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showResults('Google News', data.articles.length
                    ? data.articles.map(renderNewsItem).join('')
                    : '<div class="empty">No news articles found.</div>');
                hideStatus();
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        async function searchHN() {
            const query = document.getElementById('topic-input').value.trim() || getNiche();
            showStatus('Searching Hacker News...', 'info');
            try {
                const res = await fetch('/hackernews/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, max_results: 10 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showResults('Hacker News', data.stories.length
                    ? data.stories.map(renderHNItem).join('')
                    : '<div class="empty">No Hacker News stories found.</div>');
                hideStatus();
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        async function searchWeb() {
            const query = document.getElementById('topic-input').value.trim() || getNiche();
            showStatus('Searching the web...', 'info');
            try {
                const res = await fetch('/web-search/trending', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, max_results: 10 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                showResults('Web Search Results', data.results.length
                    ? data.results.map(renderWebItem).join('')
                    : '<div class="empty">No web results found.</div>');
                hideStatus();
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        async function searchGoogleTrends() {
            const query = document.getElementById('topic-input').value.trim() || getNiche();
            showStatus('Fetching Google Trends...', 'info');
            try {
                const res = await fetch('/google-trends/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');

                let html = '';
                if (data.related_queries.length) {
                    html += '<h4 style="color:#4285f4;font-size:0.85rem;margin-bottom:8px;">Related Searches</h4>';
                    html += data.related_queries.map(q => `
                        <div class="list-item">
                            <span style="color:#4285f4;font-size:0.82rem;">${escapeHtml(q.query)}</span>
                            <span style="float:right;color:#666;font-size:0.72rem;">${q.value > 0 ? formatCount(q.value) + ' interest' : ''}</span>
                        </div>
                    `).join('');
                }
                if (data.trending_searches.length) {
                    html += '<h4 style="color:#66bb6a;font-size:0.85rem;margin:12px 0 8px;">Currently Trending on Google</h4>';
                    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;">';
                    html += data.trending_searches.map(t => `<span style="display:inline-block;padding:4px 10px;background:#141414;border:1px solid #2a2a2a;border-radius:8px;font-size:0.78rem;color:#66bb6a;">${escapeHtml(t)}</span>`).join('');
                    html += '</div>';
                }
                if (!html) html = '<div class="empty">No Google Trends data found for this query.</div>';
                showResults('Google Trends: ' + query, html);
                hideStatus();
            } catch (e) { showStatus('Error: ' + e.message, 'error'); }
        }

        document.getElementById('topic-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') generateIdeas();
        });
    </script>
</body>
</html>

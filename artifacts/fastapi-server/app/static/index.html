<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #FF6B2C;
            --orange-light: #FF8F5E;
            --orange-dark: #E55A1B;
            --orange-bg: #FFF8F5;
            --orange-bg2: #FFF0E8;
            --surface: #FFFFFF;
            --surface-2: #F5F5F5;
            --border: #EFEFEF;
            --border-hover: #E0DADA;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-muted: #999999;
            --accent-blue: #3B82F6;
            --accent-green: #10B981;
            --accent-red: #EF4444;
            --accent-purple: #8B5CF6;
            --accent-teal: #14B8A6;
            --accent-amber: #F59E0B;
            --accent-pink: #E60023;
            --accent-medium: #1A8917;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.14);
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--surface-2);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.95);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--orange), var(--orange-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
        }

        .brand-text {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .search-group {
            flex: 1;
            display: flex;
            gap: 10px;
            align-items: center;
            min-width: 0;
            max-width: 600px;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap select {
            appearance: none;
            padding: 10px 36px 10px 14px;
            border-radius: 24px;
            border: 2px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .select-wrap select:focus { border-color: var(--orange); }

        .select-wrap::after {
            content: "▾";
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .topic-input {
            flex: 1;
            min-width: 120px;
            padding: 10px 18px;
            border-radius: 24px;
            border: 2px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .topic-input:focus { border-color: var(--orange); }
        .topic-input::placeholder { color: var(--text-muted); }

        .btn-analyze {
            padding: 10px 24px;
            border-radius: 24px;
            border: none;
            background: var(--orange);
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-analyze:hover { background: var(--orange-dark); transform: scale(1.03); }
        .btn-analyze:active { transform: scale(0.98); }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        .quick-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .chip {
            padding: 8px 16px;
            border-radius: 24px;
            border: 2px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--orange);
            color: var(--orange);
            background: var(--orange-bg);
            transform: scale(1.03);
        }

        .toast {
            padding: 14px 20px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            display: none;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast.info { display: flex; align-items: center; gap: 10px; background: var(--orange-bg); color: var(--orange-dark); border: 1px solid var(--orange-bg2); }
        .toast.error { display: flex; align-items: center; gap: 10px; background: #FEF2F2; color: var(--accent-red); border: 1px solid #FECACA; }
        .toast.success { display: flex; align-items: center; gap: 10px; background: #F0FDF4; color: var(--accent-green); border: 1px solid #BBF7D0; }

        .loading-wrap {
            text-align: center;
            padding: 80px 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 18px;
        }

        .loading-wrap p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .loading-wrap .sub {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .masonry {
            columns: 3;
            column-gap: 20px;
        }

        @media (max-width: 1100px) { .masonry { columns: 2; } }
        @media (max-width: 700px) { .masonry { columns: 1; } }

        .pin-card {
            break-inside: avoid;
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s, transform 0.3s;
            cursor: default;
        }

        .pin-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .card-hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, var(--orange-bg), var(--orange-bg2));
            min-height: 80px;
        }

        .card-hero-gradient {
            padding: 24px 22px 18px;
        }

        .card-hero-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--orange);
            margin-bottom: 10px;
        }

        .card-hero-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            line-height: 1.3;
        }

        .card-hero-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 500;
        }

        .idea-item {
            padding: 20px 22px;
            border-bottom: 1px solid var(--border);
        }

        .idea-item:last-of-type { border-bottom: none; }

        .idea-num-row {
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .idea-num {
            width: 30px;
            height: 30px;
            background: var(--orange);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 800;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .idea-details { flex: 1; min-width: 0; }

        .idea-hook {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.45;
        }

        .idea-angle {
            font-size: 0.88rem;
            color: var(--accent-purple);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .idea-desc {
            font-size: 0.92rem;
            color: var(--text-secondary);
            line-height: 1.65;
            margin-bottom: 10px;
        }

        .script-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            padding: 7px 16px;
            border-radius: 24px;
            border: 2px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }

        .script-toggle:hover { border-color: var(--orange); color: var(--orange); }

        .script-box {
            display: none;
            margin-top: 12px;
            padding: 16px 18px;
            background: var(--surface-2);
            border-radius: var(--radius);
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-secondary);
            white-space: pre-wrap;
            border: 1px solid var(--border);
        }

        .script-box.open { display: block; }

        .media-strip {
            padding: 16px 22px;
            border-top: 1px solid var(--border);
        }

        .media-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .media-label:hover { color: var(--text-primary); }

        .media-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .media-label .chevron {
            font-size: 0.65rem;
            transition: transform 0.2s;
            margin-left: auto;
            color: var(--text-muted);
        }

        .media-label.open .chevron { transform: rotate(90deg); }

        .media-body { display: none; }
        .media-body.open { display: block; }

        .vid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .vid-card {
            background: var(--surface-2);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.25s;
            cursor: pointer;
        }

        .vid-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .vid-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #eee;
            overflow: hidden;
            position: relative;
        }

        .vid-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .vid-card:hover .play-overlay { opacity: 1; }

        .play-circle {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-circle::after {
            content: "";
            width: 0; height: 0;
            border-style: solid;
            border-width: 7px 0 7px 12px;
            border-color: transparent transparent transparent #fff;
            margin-left: 3px;
        }

        .vid-info {
            padding: 10px 12px;
        }

        .vid-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .vid-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .pin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }

        .pin-item {
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface-2);
            transition: all 0.25s;
            cursor: pointer;
        }

        .pin-item:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .pin-item-img {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            overflow: hidden;
        }

        .pin-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .pin-item-info {
            padding: 8px 10px;
        }

        .pin-item-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.35;
        }

        .pin-item-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .article-card {
            display: flex;
            gap: 12px;
            padding: 10px 12px;
            background: var(--surface-2);
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .article-card:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }

        .article-card-img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
            overflow: hidden;
            flex-shrink: 0;
        }

        .article-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .article-card-body {
            flex: 1;
            min-width: 0;
        }

        .article-card-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-card-meta {
            font-size: 0.76rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .link-row {
            padding: 12px 14px;
            background: var(--surface-2);
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .link-row:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }

        .link-row a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .link-row a:hover { color: var(--orange); }

        .link-row .lm {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .link-row .ls {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .empty-icon {
            width: 64px;
            height: 64px;
            background: var(--orange-bg);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .embed-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .embed-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            border: none;
            border-radius: var(--radius);
        }

        .trends-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .trends-pills span {
            padding: 6px 14px;
            background: var(--orange-bg);
            border-radius: 24px;
            font-size: 0.82rem;
            color: var(--orange);
            font-weight: 600;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pin-card { animation: fadeInUp 0.4s ease both; }
        .pin-card:nth-child(1) { animation-delay: 0s; }
        .pin-card:nth-child(2) { animation-delay: 0.1s; }
        .pin-card:nth-child(3) { animation-delay: 0.2s; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">&#9889;</div>
                <span class="brand-text">ContentEngine</span>
            </div>
            <div class="search-group">
                <div class="select-wrap">
                    <select id="niche">
                        <option value="fitness">Fitness</option>
                        <option value="dating">Dating</option>
                        <option value="finance">Finance</option>
                        <option value="productivity">Productivity</option>
                        <option value="nutrition">Nutrition</option>
                        <option value="mental health">Mental Health</option>
                        <option value="tech">Tech</option>
                        <option value="cooking">Cooking</option>
                        <option value="gaming">Gaming</option>
                        <option value="fashion">Fashion</option>
                        <option value="music">Music</option>
                        <option value="travel">Travel</option>
                        <option value="beauty">Beauty</option>
                        <option value="entrepreneurship">Business</option>
                        <option value="photography">Photography</option>
                        <option value="parenting">Parenting</option>
                        <option value="pets">Pets</option>
                        <option value="education">Education</option>
                        <option value="sports">Sports</option>
                        <option value="diy">DIY</option>
                        <option value="motivation">Motivation</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>
                <input class="topic-input" type="text" id="custom-niche" placeholder="Your niche..." style="display:none;max-width:130px;">
                <input class="topic-input" type="text" id="topic-input" placeholder="Topic (optional)...">
                <button class="btn-analyze" id="generate-btn" onclick="runAnalysis()">Analyze</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="quick-row">
            <button class="chip" onclick="searchSingle('youtube')">YouTube</button>
            <button class="chip" onclick="searchSingle('tiktok')">TikTok</button>
            <button class="chip" onclick="searchSingle('pinterest')">Pinterest</button>
            <button class="chip" onclick="searchSingle('medium')">Medium</button>
            <button class="chip" onclick="searchSingle('news')">News</button>
            <button class="chip" onclick="searchSingle('hn')">Hacker News</button>
            <button class="chip" onclick="searchSingle('web')">Web</button>
            <button class="chip" onclick="searchSingle('gtrends')">Trends</button>
        </div>

        <div class="toast" id="toast"></div>
        <div id="results"></div>
    </div>

    <script>
        const nicheEl = document.getElementById('niche');
        const customEl = document.getElementById('custom-niche');

        nicheEl.addEventListener('change', () => {
            customEl.style.display = nicheEl.value === 'custom' ? 'block' : 'none';
        });

        function getNiche() {
            return nicheEl.value === 'custom' ? (customEl.value || 'fitness') : nicheEl.value;
        }

        function getQuery() {
            return document.getElementById('topic-input').value.trim() || getNiche();
        }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
        }

        function hideToast() {
            document.getElementById('toast').className = 'toast';
        }

        function esc(t) {
            const d = document.createElement('div');
            d.textContent = t || '';
            return d.innerHTML;
        }

        function safeUrl(u) {
            if (!u) return '#';
            try { const p = new URL(u); if (p.protocol === 'https:' || p.protocol === 'http:') return u; } catch {}
            return '#';
        }

        function fmt(n) {
            n = n || 0;
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return String(n);
        }

        function toggleScript(btn) {
            const box = btn.nextElementSibling;
            box.classList.toggle('open');
            btn.textContent = box.classList.contains('open') ? 'Hide Script' : 'Read Script';
        }

        function toggleMedia(el) {
            el.classList.toggle('open');
            el.nextElementSibling.classList.toggle('open');
        }

        const heroGradients = [
            'linear-gradient(135deg, #FFF0E8, #FFE0CC)',
            'linear-gradient(135deg, #E8F4FD, #D1ECFF)',
            'linear-gradient(135deg, #F0FDF4, #D1FAE5)',
        ];

        function renderIdea(idea, i) {
            return `
                <div class="idea-item">
                    <div class="idea-num-row">
                        <div class="idea-num">${i + 1}</div>
                        <div class="idea-details">
                            <div class="idea-hook">${esc(idea.hook)}</div>
                            ${idea.angle ? `<div class="idea-angle">${esc(idea.angle)}</div>` : ''}
                            <div class="idea-desc">${esc(idea.idea)}</div>
                            ${idea.script ? `
                                <button class="script-toggle" onclick="toggleScript(this)">Read Script</button>
                                <div class="script-box">${esc(idea.script)}</div>
                            ` : ''}
                        </div>
                    </div>
                </div>`;
        }

        function renderYT(v) {
            const vid = v.video_id || v.videoId || '';
            return `
                <div class="vid-card" onclick="this.querySelector('.vid-thumb').innerHTML='<div class=\\'embed-wrap\\'><iframe src=\\'https://www.youtube.com/embed/${vid}?autoplay=1\\' allow=\\'autoplay\\' allowfullscreen></iframe></div>'">
                    <div class="vid-thumb">
                        ${v.thumbnail ? `<img src="${v.thumbnail}" loading="lazy">` : ''}
                        <div class="play-overlay"><div class="play-circle"></div></div>
                    </div>
                    <div class="vid-info">
                        <div class="vid-title">${esc(v.title)}</div>
                        <div class="vid-meta">${esc(v.channel || v.channelTitle || '')}</div>
                    </div>
                </div>`;
        }

        function renderTT(v) {
            return `
                <div class="vid-card">
                    <a href="${safeUrl(v.url)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">
                        <div class="vid-thumb" style="aspect-ratio:9/16;max-height:160px;">
                            ${v.cover ? `<img src="${v.cover}" loading="lazy">` : `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--accent-teal);font-size:0.85rem;font-weight:600;">View on TikTok</div>`}
                        </div>
                        <div class="vid-info">
                            <div class="vid-title">${esc(v.description)}</div>
                            <div class="vid-meta">@${esc(v.author)} &middot; ${fmt(v.play_count)} plays</div>
                        </div>
                    </a>
                </div>`;
        }

        function renderPin(p) {
            return `
                <a href="${safeUrl(p.link)}" target="_blank" rel="noopener" class="pin-item" style="text-decoration:none;color:inherit;">
                    <div class="pin-item-img">
                        ${p.image_url ? `<img src="${esc(p.image_url)}" loading="lazy" onerror="this.style.display='none'">` : ''}
                    </div>
                    <div class="pin-item-info">
                        <div class="pin-item-title">${esc(p.title)}</div>
                        ${p.pinner ? `<div class="pin-item-meta">${esc(p.pinner)}${p.board_name ? ' &middot; ' + esc(p.board_name) : ''}</div>` : ''}
                    </div>
                </a>`;
        }

        function renderMediumArticle(a) {
            return `
                <a href="${safeUrl(a.url)}" target="_blank" rel="noopener" class="article-card">
                    ${a.image_url ? `<div class="article-card-img"><img src="${esc(a.image_url)}" loading="lazy" onerror="this.style.display='none'"></div>` : ''}
                    <div class="article-card-body">
                        <div class="article-card-title">${esc(a.title)}</div>
                        <div class="article-card-meta">
                            ${a.author ? esc(a.author) : 'Medium'}
                            ${a.reading_time ? ' &middot; ' + a.reading_time + ' min read' : ''}
                            ${a.claps ? ' &middot; ' + fmt(a.claps) + ' claps' : ''}
                        </div>
                    </div>
                </a>`;
        }

        function renderNewsRow(a) {
            return `<div class="link-row"><a href="${safeUrl(a.link)}" target="_blank">${esc(a.title)}</a><div class="lm">${esc(a.source || '')} &middot; ${esc(a.published || '')}</div></div>`;
        }

        function renderHNRow(s) {
            return `<div class="link-row"><a href="${safeUrl(s.hn_link || s.url)}" target="_blank">${esc(s.title)}</a><div class="lm">${s.score} pts &middot; ${s.comments} comments</div></div>`;
        }

        function renderWebRow(r) {
            return `<div class="link-row"><a href="${safeUrl(r.url)}" target="_blank">${esc(r.title)}</a><div class="ls">${esc(r.snippet)}</div></div>`;
        }

        function renderRedditRow(p) {
            return `<div class="link-row"><a href="${safeUrl(p.url)}" target="_blank">${esc(p.title)}</a><div class="lm">r/${esc(p.subreddit)} &middot; ${fmt(p.score)} upvotes &middot; ${p.num_comments} comments</div></div>`;
        }

        function mediaSection(label, dotColor, items, fn, layout) {
            if (!items || !items.length) return '';
            let inner;
            if (layout === 'vid-grid') {
                inner = `<div class="vid-grid">${items.map(fn).join('')}</div>`;
            } else if (layout === 'pin-grid') {
                inner = `<div class="pin-grid">${items.map(fn).join('')}</div>`;
            } else {
                inner = items.map(fn).join('');
            }
            return `
                <div class="media-strip">
                    <div class="media-label" onclick="toggleMedia(this)">
                        <span class="dot" style="background:${dotColor};"></span>
                        ${label} <span style="font-weight:400;color:var(--text-muted);">(${items.length})</span>
                        <span class="chevron">&#9656;</span>
                    </div>
                    <div class="media-body">
                        ${inner}
                    </div>
                </div>`;
        }

        function renderTrendCard(ti, idx) {
            const gradient = heroGradients[idx % heroGradients.length];
            const gd = ti.google_trends_data || {};
            const rq = gd.related_queries || [];
            const ts = gd.trending_searches || [];

            let trendsHtml = '';
            if (rq.length || ts.length) {
                trendsHtml = `
                    <div class="media-strip">
                        <div class="media-label" onclick="toggleMedia(this)">
                            <span class="dot" style="background:var(--accent-blue);"></span>
                            Google Trends <span class="chevron">&#9656;</span>
                        </div>
                        <div class="media-body">
                            <div class="trends-pills">
                                ${rq.map(q => `<span>${esc(q.query)}</span>`).join('')}
                                ${ts.map(t => `<span style="background:#F0FDF4;color:var(--accent-green);">${esc(t)}</span>`).join('')}
                            </div>
                        </div>
                    </div>`;
            }

            return `
                <div class="pin-card">
                    <div class="card-hero" style="background:${gradient};">
                        <div class="card-hero-gradient">
                            <div class="card-hero-label">${ti.ideas.length} ideas</div>
                            <div class="card-hero-title">${esc(ti.trend)}</div>
                            <div class="card-hero-sub">Viral content ideas with scripts</div>
                        </div>
                    </div>
                    ${ti.ideas.map((idea, i) => renderIdea(idea, i)).join('')}
                    ${mediaSection('YouTube Videos', 'var(--accent-red)', ti.example_videos, renderYT, 'vid-grid')}
                    ${mediaSection('TikTok', 'var(--accent-teal)', ti.tiktok_videos, renderTT, 'vid-grid')}
                    ${mediaSection('Pinterest Pins', 'var(--accent-pink)', ti.pinterest_pins, renderPin, 'pin-grid')}
                    ${mediaSection('Medium Articles', 'var(--accent-medium)', ti.medium_articles, renderMediumArticle, 'list')}
                    ${trendsHtml}
                    ${mediaSection('News', 'var(--accent-green)', ti.google_news, renderNewsRow, 'list')}
                    ${mediaSection('Reddit', 'var(--orange)', ti.reddit_posts, renderRedditRow, 'list')}
                    ${mediaSection('Hacker News', 'var(--accent-amber)', ti.hackernews_stories, renderHNRow, 'list')}
                    ${mediaSection('Web', 'var(--accent-purple)', ti.web_results, renderWebRow, 'list')}
                </div>`;
        }

        async function runAnalysis() {
            const niche = getNiche();
            const btn = document.getElementById('generate-btn');
            const el = document.getElementById('results');
            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            el.innerHTML = `<div class="loading-wrap"><div class="loader"></div><p>Discovering trends for "${esc(niche)}"</p><p class="sub">Scanning 10 sources & generating AI ideas (~20s)</p></div>`;
            showToast('Analyzing trends across all sources...', 'info');

            try {
                const res = await fetch('/trend-ideas/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');

                if (!data.trend_ideas || !data.trend_ideas.length) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-icon">&#128269;</div><h3>No trends found</h3><p>Try a different niche or check back later.</p></div>`;
                    hideToast();
                    return;
                }

                el.innerHTML = '<div class="masonry">' + data.trend_ideas.map((ti, i) => renderTrendCard(ti, i)).join('') + '</div>';
                hideToast();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
                el.innerHTML = '';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze';
            }
        }

        async function searchSingle(source) {
            const query = getQuery();
            const el = document.getElementById('results');
            el.innerHTML = `<div class="loading-wrap"><div class="loader"></div><p>Searching...</p></div>`;
            showToast(`Searching ${source}...`, 'info');

            const endpoints = {
                youtube: { url: '/youtube/search', body: { query, max_results: 6 }, render: (d) => d.videos?.length ? `<div class="vid-grid">${d.videos.map(renderYT).join('')}</div>` : '<div class="empty-state"><div class="empty-icon">&#128249;</div><h3>No videos found</h3></div>' },
                tiktok: { url: '/tiktok/search', body: { query, max_results: 6 }, render: (d) => d.videos?.length ? `<div class="vid-grid">${d.videos.map(renderTT).join('')}</div>` : '<div class="empty-state"><div class="empty-icon">&#127925;</div><h3>No results</h3></div>' },
                pinterest: { url: '/pinterest/search', body: { query, max_results: 8 }, render: (d) => d.pins?.length ? `<div class="pin-grid">${d.pins.map(renderPin).join('')}</div>` : '<div class="empty-state"><div class="empty-icon">&#128204;</div><h3>No pins found</h3></div>' },
                medium: { url: '/medium/search', body: { query, max_results: 8 }, render: (d) => d.articles?.length ? d.articles.map(renderMediumArticle).join('') : '<div class="empty-state"><div class="empty-icon">&#128221;</div><h3>No articles found</h3></div>' },
                news: { url: '/google-news/search', body: { query, max_results: 10 }, render: (d) => d.articles?.length ? d.articles.map(renderNewsRow).join('') : '<div class="empty-state"><div class="empty-icon">&#128240;</div><h3>No news found</h3></div>' },
                hn: { url: '/hackernews/search', body: { query, max_results: 10 }, render: (d) => d.stories?.length ? d.stories.map(renderHNRow).join('') : '<div class="empty-state"><div class="empty-icon">&#128310;</div><h3>No stories found</h3></div>' },
                web: { url: '/web-search/trending', body: { query, max_results: 10 }, render: (d) => d.results?.length ? d.results.map(renderWebRow).join('') : '<div class="empty-state"><div class="empty-icon">&#127760;</div><h3>No results</h3></div>' },
                gtrends: {
                    url: '/google-trends/search', body: { query },
                    render: (d) => {
                        let h = '';
                        if (d.related_queries?.length)
                            h += `<div style="margin-bottom:14px;"><div style="font-size:0.92rem;font-weight:700;color:var(--accent-blue);margin-bottom:10px;">Related Searches</div><div class="trends-pills">${d.related_queries.map(q => `<span>${esc(q.query)}</span>`).join('')}</div></div>`;
                        if (d.trending_searches?.length)
                            h += `<div><div style="font-size:0.92rem;font-weight:700;color:var(--accent-green);margin-bottom:10px;">Trending Now</div><div class="trends-pills">${d.trending_searches.map(t => `<span style="background:#F0FDF4;color:var(--accent-green);">${esc(t)}</span>`).join('')}</div></div>`;
                        return h || '<div class="empty-state"><div class="empty-icon">&#128202;</div><h3>No trends data</h3></div>';
                    }
                },
            };

            const cfg = endpoints[source];
            if (!cfg) return;

            try {
                const res = await fetch(cfg.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cfg.body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                const label = source.charAt(0).toUpperCase() + source.slice(1);
                el.innerHTML = `<div class="pin-card"><div class="card-hero" style="background:${heroGradients[0]};"><div class="card-hero-gradient"><div class="card-hero-title">${esc(label)}: ${esc(query)}</div></div></div><div style="padding:20px 22px;">${cfg.render(data)}</div></div>`;
                hideToast();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
                el.innerHTML = '';
            }
        }

        document.getElementById('topic-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') runAnalysis();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --orange: #FF6B2C;
            --orange-light: #FF8F5E;
            --orange-dark: #E55A1B;
            --orange-bg: #FFF8F5;
            --orange-bg2: #FFF0E8;
            --surface: #FFFFFF;
            --surface-2: #FAFAFA;
            --border: #F0EDED;
            --border-hover: #E0DADA;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-muted: #9E9E9E;
            --accent-blue: #3B82F6;
            --accent-green: #10B981;
            --accent-red: #EF4444;
            --accent-purple: #8B5CF6;
            --accent-teal: #14B8A6;
            --accent-amber: #F59E0B;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 12px;
            --radius-lg: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--surface-2);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--orange), var(--orange-light));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
        }

        .brand-text {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .search-group {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
            min-width: 0;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap select {
            appearance: none;
            padding: 9px 32px 9px 12px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .select-wrap select:focus { border-color: var(--orange); }

        .select-wrap::after {
            content: "▾";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .topic-input {
            flex: 1;
            min-width: 120px;
            padding: 9px 14px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 0.82rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .topic-input:focus { border-color: var(--orange); }
        .topic-input::placeholder { color: var(--text-muted); }

        .btn-analyze {
            padding: 9px 20px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--orange), var(--orange-dark));
            color: #fff;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(255,107,44,0.3);
        }

        .btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(255,107,44,0.4); }
        .btn-analyze:active { transform: translateY(0); }
        .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
        }

        .quick-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .chip {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: var(--orange);
            color: var(--orange);
            background: var(--orange-bg);
        }

        .toast {
            padding: 10px 16px;
            border-radius: var(--radius);
            margin-bottom: 14px;
            font-size: 0.82rem;
            font-weight: 500;
            display: none;
            animation: toastIn 0.3s ease;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast.info { display: flex; align-items: center; gap: 8px; background: var(--orange-bg); color: var(--orange-dark); border: 1px solid var(--orange-bg2); }
        .toast.error { display: flex; align-items: center; gap: 8px; background: #FEF2F2; color: var(--accent-red); border: 1px solid #FECACA; }
        .toast.success { display: flex; align-items: center; gap: 8px; background: #F0FDF4; color: var(--accent-green); border: 1px solid #BBF7D0; }

        .loading-wrap {
            text-align: center;
            padding: 60px 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 14px;
        }

        .loading-wrap p {
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .loading-wrap .sub {
            font-size: 0.76rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .idea-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 18px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.25s;
        }

        .idea-card:hover { box-shadow: var(--shadow-md); }

        .card-top {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-top-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trend-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--orange-bg), var(--orange-bg2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .trend-label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .trend-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .tag {
            font-size: 0.68rem;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 600;
        }

        .tag-orange { background: var(--orange-bg2); color: var(--orange); }

        .idea-item {
            padding: 18px 22px;
            border-bottom: 1px solid var(--surface-2);
        }

        .idea-item:last-of-type { border-bottom: none; }

        .idea-num-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .idea-num {
            width: 26px;
            height: 26px;
            background: var(--orange);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .idea-details { flex: 1; min-width: 0; }

        .idea-hook {
            font-weight: 700;
            font-size: 0.88rem;
            color: var(--orange-dark);
            margin-bottom: 3px;
            line-height: 1.4;
        }

        .idea-angle {
            font-size: 0.78rem;
            color: var(--accent-purple);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .idea-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.55;
            margin-bottom: 8px;
        }

        .script-toggle {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
        }

        .script-toggle:hover { border-color: var(--orange); color: var(--orange); }

        .script-box {
            display: none;
            margin-top: 10px;
            padding: 14px 16px;
            background: var(--surface-2);
            border-radius: 10px;
            font-size: 0.8rem;
            line-height: 1.75;
            color: var(--text-secondary);
            white-space: pre-wrap;
            border: 1px solid var(--border);
        }

        .script-box.open { display: block; }

        .media-strip {
            padding: 16px 22px;
            border-top: 1px solid var(--border);
        }

        .media-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.76rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
            cursor: pointer;
            user-select: none;
        }

        .media-label .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .media-label .chevron {
            font-size: 0.6rem;
            transition: transform 0.2s;
            margin-left: auto;
            color: var(--text-muted);
        }

        .media-label.open .chevron { transform: rotate(90deg); }

        .media-body { display: none; }
        .media-body.open { display: block; }

        .vid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 10px;
        }

        .vid-card {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
        }

        .vid-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-sm); }

        .vid-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #f0eded;
            overflow: hidden;
            position: relative;
        }

        .vid-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.15);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .vid-card:hover .play-overlay { opacity: 1; }

        .play-circle {
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-circle::after {
            content: "";
            width: 0; height: 0;
            border-style: solid;
            border-width: 6px 0 6px 10px;
            border-color: transparent transparent transparent #fff;
            margin-left: 2px;
        }

        .vid-info {
            padding: 8px 10px;
        }

        .vid-title {
            font-size: 0.74rem;
            font-weight: 500;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .vid-meta {
            font-size: 0.66rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .link-row {
            padding: 8px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 6px;
            transition: border-color 0.2s;
        }

        .link-row:hover { border-color: var(--border-hover); }

        .link-row a {
            color: var(--orange);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .link-row a:hover { text-decoration: underline; }

        .link-row .lm {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .link-row .ls {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
        }

        .empty-state .empty-icon {
            width: 56px;
            height: 56px;
            background: var(--orange-bg);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 24px;
        }

        .empty-state h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .embed-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
        }

        .embed-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            border: none;
            border-radius: var(--radius);
        }

        .trends-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .trends-pills span {
            padding: 4px 10px;
            background: var(--orange-bg);
            border: 1px solid var(--orange-bg2);
            border-radius: 6px;
            font-size: 0.72rem;
            color: var(--orange);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <span class="brand-text">ContentEngine</span>
            </div>
            <div class="search-group">
                <div class="select-wrap">
                    <select id="niche">
                        <option value="fitness">Fitness</option>
                        <option value="dating">Dating</option>
                        <option value="finance">Finance</option>
                        <option value="productivity">Productivity</option>
                        <option value="nutrition">Nutrition</option>
                        <option value="mental health">Mental Health</option>
                        <option value="tech">Tech</option>
                        <option value="cooking">Cooking</option>
                        <option value="gaming">Gaming</option>
                        <option value="fashion">Fashion</option>
                        <option value="music">Music</option>
                        <option value="travel">Travel</option>
                        <option value="beauty">Beauty</option>
                        <option value="entrepreneurship">Business</option>
                        <option value="photography">Photography</option>
                        <option value="parenting">Parenting</option>
                        <option value="pets">Pets</option>
                        <option value="education">Education</option>
                        <option value="sports">Sports</option>
                        <option value="diy">DIY</option>
                        <option value="motivation">Motivation</option>
                        <option value="custom">Custom...</option>
                    </select>
                </div>
                <input class="topic-input" type="text" id="custom-niche" placeholder="Your niche..." style="display:none;max-width:130px;">
                <input class="topic-input" type="text" id="topic-input" placeholder="Topic (optional)...">
                <button class="btn-analyze" id="generate-btn" onclick="runAnalysis()">Analyze</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="quick-row">
            <button class="chip" onclick="searchSingle('youtube')">YouTube</button>
            <button class="chip" onclick="searchSingle('tiktok')">TikTok</button>
            <button class="chip" onclick="searchSingle('news')">News</button>
            <button class="chip" onclick="searchSingle('hn')">Hacker News</button>
            <button class="chip" onclick="searchSingle('web')">Web</button>
            <button class="chip" onclick="searchSingle('gtrends')">Trends</button>
        </div>

        <div class="toast" id="toast"></div>
        <div id="results"></div>
    </div>

    <script>
        const nicheEl = document.getElementById('niche');
        const customEl = document.getElementById('custom-niche');

        nicheEl.addEventListener('change', () => {
            customEl.style.display = nicheEl.value === 'custom' ? 'block' : 'none';
        });

        function getNiche() {
            return nicheEl.value === 'custom' ? (customEl.value || 'fitness') : nicheEl.value;
        }

        function getQuery() {
            return document.getElementById('topic-input').value.trim() || getNiche();
        }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
        }

        function hideToast() {
            document.getElementById('toast').className = 'toast';
        }

        function esc(t) {
            const d = document.createElement('div');
            d.textContent = t || '';
            return d.innerHTML;
        }

        function safeUrl(u) {
            if (!u) return '#';
            try { const p = new URL(u); if (p.protocol === 'https:' || p.protocol === 'http:') return u; } catch {}
            return '#';
        }

        function fmt(n) {
            n = n || 0;
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return String(n);
        }

        function toggleScript(btn) {
            const box = btn.nextElementSibling;
            box.classList.toggle('open');
            btn.textContent = box.classList.contains('open') ? '▴ Hide Script' : '▾ Read Script';
        }

        function toggleMedia(el) {
            el.classList.toggle('open');
            el.nextElementSibling.classList.toggle('open');
        }

        const trendIcons = ['🔥', '💡', '⚡'];

        function renderIdea(idea, i) {
            return `
                <div class="idea-item">
                    <div class="idea-num-row">
                        <div class="idea-num">${i + 1}</div>
                        <div class="idea-details">
                            <div class="idea-hook">${esc(idea.hook)}</div>
                            ${idea.angle ? `<div class="idea-angle">${esc(idea.angle)}</div>` : ''}
                            <div class="idea-desc">${esc(idea.idea)}</div>
                            ${idea.script ? `
                                <button class="script-toggle" onclick="toggleScript(this)">▾ Read Script</button>
                                <div class="script-box">${esc(idea.script)}</div>
                            ` : ''}
                        </div>
                    </div>
                </div>`;
        }

        function renderYT(v) {
            const vid = v.video_id || v.videoId || '';
            return `
                <div class="vid-card" onclick="this.querySelector('.vid-thumb').innerHTML='<div class=\\'embed-wrap\\'><iframe src=\\'https://www.youtube.com/embed/${vid}?autoplay=1\\' allow=\\'autoplay\\' allowfullscreen></iframe></div>'">
                    <div class="vid-thumb">
                        ${v.thumbnail ? `<img src="${v.thumbnail}" loading="lazy">` : ''}
                        <div class="play-overlay"><div class="play-circle"></div></div>
                    </div>
                    <div class="vid-info">
                        <div class="vid-title">${esc(v.title)}</div>
                        <div class="vid-meta">${esc(v.channel || v.channelTitle || '')}</div>
                    </div>
                </div>`;
        }

        function renderTT(v) {
            return `
                <div class="vid-card">
                    <a href="${safeUrl(v.url)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit;">
                        <div class="vid-thumb" style="aspect-ratio:9/16;max-height:130px;">
                            ${v.cover ? `<img src="${v.cover}" loading="lazy">` : `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--accent-teal);font-size:0.75rem;">View on TikTok →</div>`}
                        </div>
                        <div class="vid-info">
                            <div class="vid-title">${esc(v.description)}</div>
                            <div class="vid-meta">@${esc(v.author)} · ${fmt(v.play_count)} plays</div>
                        </div>
                    </a>
                </div>`;
        }

        function renderNewsRow(a) {
            return `<div class="link-row"><a href="${safeUrl(a.link)}" target="_blank">${esc(a.title)}</a><div class="lm">${esc(a.source || '')} · ${esc(a.published || '')}</div></div>`;
        }

        function renderHNRow(s) {
            return `<div class="link-row"><a href="${safeUrl(s.hn_link || s.url)}" target="_blank">${esc(s.title)}</a><div class="lm">${s.score} pts · ${s.comments} comments</div></div>`;
        }

        function renderWebRow(r) {
            return `<div class="link-row"><a href="${safeUrl(r.url)}" target="_blank">${esc(r.title)}</a><div class="ls">${esc(r.snippet)}</div></div>`;
        }

        function renderRedditRow(p) {
            return `<div class="link-row"><a href="${safeUrl(p.url)}" target="_blank">${esc(p.title)}</a><div class="lm">r/${esc(p.subreddit)} · ${fmt(p.score)} upvotes · ${p.num_comments} comments</div></div>`;
        }

        function mediaSection(label, dotColor, items, fn, isGrid) {
            if (!items || !items.length) return '';
            return `
                <div class="media-strip">
                    <div class="media-label" onclick="toggleMedia(this)">
                        <span class="dot" style="background:${dotColor};"></span>
                        ${label} <span style="font-weight:400;color:var(--text-muted);">(${items.length})</span>
                        <span class="chevron">▸</span>
                    </div>
                    <div class="media-body">
                        ${isGrid ? `<div class="vid-grid">${items.map(fn).join('')}</div>` : items.map(fn).join('')}
                    </div>
                </div>`;
        }

        function renderTrendCard(ti, idx) {
            const icon = trendIcons[idx % trendIcons.length];
            const gd = ti.google_trends_data || {};
            const rq = gd.related_queries || [];
            const ts = gd.trending_searches || [];

            let trendsHtml = '';
            if (rq.length || ts.length) {
                trendsHtml = `
                    <div class="media-strip">
                        <div class="media-label" onclick="toggleMedia(this)">
                            <span class="dot" style="background:var(--accent-blue);"></span>
                            Google Trends <span class="chevron">▸</span>
                        </div>
                        <div class="media-body">
                            <div class="trends-pills">
                                ${rq.map(q => `<span>${esc(q.query)}</span>`).join('')}
                                ${ts.map(t => `<span style="background:#F0FDF4;color:var(--accent-green);border-color:#BBF7D0;">${esc(t)}</span>`).join('')}
                            </div>
                        </div>
                    </div>`;
            }

            return `
                <div class="idea-card">
                    <div class="card-top">
                        <div class="card-top-left">
                            <div class="trend-icon">${icon}</div>
                            <div>
                                <div class="trend-label">${esc(ti.trend)}</div>
                                <div class="trend-sub">Top ideas with scripts</div>
                            </div>
                        </div>
                        <span class="tag tag-orange">${ti.ideas.length} ideas</span>
                    </div>
                    ${ti.ideas.map((idea, i) => renderIdea(idea, i)).join('')}
                    ${mediaSection('YouTube Videos', 'var(--accent-red)', ti.example_videos, renderYT, true)}
                    ${mediaSection('TikTok', 'var(--accent-teal)', ti.tiktok_videos, renderTT, true)}
                    ${trendsHtml}
                    ${mediaSection('News', 'var(--accent-green)', ti.google_news, renderNewsRow, false)}
                    ${mediaSection('Reddit', 'var(--orange)', ti.reddit_posts, renderRedditRow, false)}
                    ${mediaSection('Hacker News', 'var(--accent-amber)', ti.hackernews_stories, renderHNRow, false)}
                    ${mediaSection('Web', 'var(--accent-purple)', ti.web_results, renderWebRow, false)}
                </div>`;
        }

        async function runAnalysis() {
            const niche = getNiche();
            const btn = document.getElementById('generate-btn');
            const el = document.getElementById('results');
            btn.disabled = true;
            btn.textContent = 'Analyzing...';
            el.innerHTML = `<div class="loading-wrap"><div class="loader"></div><p>Discovering trends for "${esc(niche)}"</p><p class="sub">Scanning 8 sources & generating AI ideas (~20s)</p></div>`;
            showToast('Analyzing trends across all sources...', 'info');

            try {
                const res = await fetch('/trend-ideas/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ niche })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');

                if (!data.trend_ideas || !data.trend_ideas.length) {
                    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><h3>No trends found</h3><p>Try a different niche or check back later.</p></div>`;
                    hideToast();
                    return;
                }

                el.innerHTML = data.trend_ideas.map((ti, i) => renderTrendCard(ti, i)).join('');
                hideToast();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
                el.innerHTML = '';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze';
            }
        }

        async function searchSingle(source) {
            const query = getQuery();
            const el = document.getElementById('results');
            el.innerHTML = `<div class="loading-wrap"><div class="loader"></div><p>Searching...</p></div>`;
            showToast(`Searching ${source}...`, 'info');

            const endpoints = {
                youtube: { url: '/youtube/search', body: { query, max_results: 6 }, render: (d) => d.videos?.length ? `<div class="vid-grid">${d.videos.map(renderYT).join('')}</div>` : '<div class="empty-state"><div class="empty-icon">📹</div><h3>No videos found</h3></div>' },
                tiktok: { url: '/tiktok/search', body: { query, max_results: 6 }, render: (d) => d.videos?.length ? `<div class="vid-grid">${d.videos.map(renderTT).join('')}</div>` : '<div class="empty-state"><div class="empty-icon">🎵</div><h3>No results</h3></div>' },
                news: { url: '/google-news/search', body: { query, max_results: 10 }, render: (d) => d.articles?.length ? d.articles.map(renderNewsRow).join('') : '<div class="empty-state"><div class="empty-icon">📰</div><h3>No news found</h3></div>' },
                hn: { url: '/hackernews/search', body: { query, max_results: 10 }, render: (d) => d.stories?.length ? d.stories.map(renderHNRow).join('') : '<div class="empty-state"><div class="empty-icon">🔶</div><h3>No stories found</h3></div>' },
                web: { url: '/web-search/trending', body: { query, max_results: 10 }, render: (d) => d.results?.length ? d.results.map(renderWebRow).join('') : '<div class="empty-state"><div class="empty-icon">🌐</div><h3>No results</h3></div>' },
                gtrends: {
                    url: '/google-trends/search', body: { query },
                    render: (d) => {
                        let h = '';
                        if (d.related_queries?.length)
                            h += `<div style="margin-bottom:12px;"><div style="font-size:0.8rem;font-weight:600;color:var(--accent-blue);margin-bottom:8px;">Related Searches</div><div class="trends-pills">${d.related_queries.map(q => `<span>${esc(q.query)}</span>`).join('')}</div></div>`;
                        if (d.trending_searches?.length)
                            h += `<div><div style="font-size:0.8rem;font-weight:600;color:var(--accent-green);margin-bottom:8px;">Trending Now</div><div class="trends-pills">${d.trending_searches.map(t => `<span style="background:#F0FDF4;color:var(--accent-green);border-color:#BBF7D0;">${esc(t)}</span>`).join('')}</div></div>`;
                        return h || '<div class="empty-state"><div class="empty-icon">📊</div><h3>No trends data</h3></div>';
                    }
                },
            };

            const cfg = endpoints[source];
            if (!cfg) return;

            try {
                const res = await fetch(cfg.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cfg.body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed');
                const label = source.charAt(0).toUpperCase() + source.slice(1);
                el.innerHTML = `<div class="idea-card"><div class="card-top"><div class="card-top-left"><div class="trend-icon">🔍</div><div><div class="trend-label">${esc(label)}: ${esc(query)}</div></div></div></div><div style="padding:16px 22px;">${cfg.render(data)}</div></div>`;
                hideToast();
            } catch (e) {
                showToast('Error: ' + e.message, 'error');
                el.innerHTML = '';
            }
        }

        document.getElementById('topic-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') runAnalysis();
        });
    </script>
</body>
</html>

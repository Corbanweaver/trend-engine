name: Production Health

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

jobs:
  health:
    name: Check live site health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check production health
        run: node scripts/check-production-health.mjs
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://www.contentideamaker.com' }}
          HEALTHCHECK_SECRET: ${{ secrets.HEALTHCHECK_SECRET }}
